<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manyfold — STL Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-name">MANYFOLD</div>
      <div class="brand-sub">STL Library</div>
    </div>

    <div class="config-section">
      <div class="config-label">
        Connection
        <span class="config-clear" onclick="clearCredentials()">Clear saved</span>
      </div>
      <input class="config-input" id="server-url" placeholder="Server URL">
      <input class="config-input" id="client-id" placeholder="Client ID">
      <input class="config-input" id="client-secret" placeholder="Client Secret" type="password">
      <button class="connect-btn" onclick="connect()">Connect</button>
      <div class="connect-status status-idle" id="connect-status">Not connected</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Browse</div>
      <div class="nav-item active" onclick="setView('models')" id="nav-models">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Models
        <span class="nav-count" id="count-models">—</span>
      </div>
      <div class="nav-item" onclick="setView('collections')" id="nav-collections">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Collections
        <span class="nav-count" id="count-collections">—</span>
      </div>
      <div class="nav-item" onclick="setView('creators')" id="nav-creators">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Creators
        <span class="nav-count" id="count-creators">—</span>
      </div>
    </div>

    <div class="tag-section">
      <div class="nav-label" style="padding:0 8px;margin-bottom:8px">Tags</div>
      <div class="tag-chips" id="tag-chips">
        <span style="font-size:11px;color:var(--text3);padding:4px 8px">Connect to load tags</span>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="bottom-btn" onclick="openProfile()" title="Profile">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </div>
      <div class="bottom-btn" onclick="openSettings()" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title" id="toolbar-title">All Models</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search models..." id="search-input" oninput="debounceSearch()">
      </div>
      <div class="sort-wrap">
        <select id="sort-select" onchange="fetchModels(1)">
          <option value="name">Sort: Name</option>
          <option value="recent">Sort: Recent</option>
          <option value="updated">Sort: Updated</option>
        </select>
      </div>
      <div class="view-btns">
        <button class="view-btn active" id="vbtn-grid" onclick="setDisplayMode('grid')" title="Grid view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="vbtn-list" onclick="setDisplayMode('list')" title="List view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <div class="empty-title">Connect to your library</div>
        <div class="empty-sub">Enter your Manyfold server URL and API credentials, then click Connect</div>
      </div>
    </div>

    <div class="statusbar">
      <div class="stat">Models: <span id="stat-total">—</span></div>
      <div class="stat">Page: <span id="stat-page">—</span></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
