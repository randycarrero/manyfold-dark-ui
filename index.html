<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxenworks — STL Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --surface: #161618;
  --surface2: #1e1e21;
  --border: #2a2a2e;
  --border2: #3a3a3f;
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --text: #f0f0f2;
  --text2: #8a8a95;
  --text3: #555560;
  --red: #ff4757;
  --teal: #2ed8a8;
  --blue: #4a9eff;
  --purple: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

.app { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.brand-name { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
.brand-sub { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

.nav-section { padding: 16px 12px 8px; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border: 1px solid transparent; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
.nav-count { margin-left: auto; font-size: 11px; font-family: 'Space Mono', monospace; color: var(--text3); }
.nav-item.active .nav-count { color: var(--accent); }

.config-section { padding: 12px; border-bottom: 1px solid var(--border); }
.config-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.config-clear { font-size: 10px; color: var(--red); cursor: pointer; text-decoration: none; }
.config-clear:hover { opacity: 0.8; }
.config-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-size: 11px; padding: 6px 8px; font-family: 'Space Mono', monospace; outline: none; margin-bottom: 4px; }
.config-input:focus { border-color: var(--accent); }
.config-input::placeholder { color: var(--text3); }
.connect-btn { width: 100%; padding: 7px; background: var(--accent); color: #0d0d0f; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
.connect-btn:hover { opacity: 0.9; }
.connect-status { font-size: 11px; margin-top: 5px; padding: 4px 8px; border-radius: 4px; text-align: center; }
.status-ok { background: rgba(46,216,168,0.1); color: var(--teal); }
.status-err { background: rgba(255,71,87,0.1); color: var(--red); }
.status-loading { background: rgba(232,255,71,0.1); color: var(--accent); }
.status-idle { background: var(--surface2); color: var(--text3); }

.tag-section { padding: 0 12px 12px; flex: 1; overflow-y: auto; }
.tag-chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 0; }
.tag-chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text3); cursor: pointer; transition: all 0.15s; font-family: 'Space Mono', monospace; }
.tag-chip:hover { color: var(--text2); }
.tag-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.07); }

.toolbar { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: var(--surface); }
.toolbar-title { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text2); white-space: nowrap; }
.search-wrap { flex: 1; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); pointer-events: none; }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 8px 12px 8px 32px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--border2); }
.search-input::placeholder { color: var(--text3); }
.sort-wrap select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 12px; padding: 8px 10px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; }
.view-btns { display: flex; gap: 4px; }
.view-btn { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 5px; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.15s; }
.view-btn.active, .view-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

.content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.list { display: flex; flex-direction: column; gap: 6px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
.card:hover { border-color: var(--border2); transform: translateY(-1px); }
.card-thumb { height: 120px; background: var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-thumb svg { width: 48px; height: 48px; color: var(--text3); }
.format-badge { position: absolute; top: 8px; right: 8px; font-size: 9px; font-family: 'Space Mono', monospace; font-weight: 700; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.05em; background: rgba(74,158,255,0.15); color: var(--blue); }
.card-body { padding: 10px 12px; }
.card-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.card-sub { font-size: 11px; color: var(--text3); margin-bottom: 6px; }

.list-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all 0.15s; }
.list-item:hover { border-color: var(--border2); }
.list-icon { width: 36px; height: 36px; background: var(--surface2); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.list-icon img { width: 100%; height: 100%; object-fit: cover; }
.list-icon svg { width: 20px; height: 20px; color: var(--text3); }
.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

.pagination { display: flex; gap: 6px; align-items: center; justify-content: center; padding: 16px; }
.page-btn { padding: 6px 12px; border: 1px solid var(--border2); border-radius: 5px; background: var(--surface); color: var(--text2); font-size: 12px; cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.15s; }
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); color: #0d0d0f; border-color: var(--accent); font-weight: 700; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-info { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }

.statusbar { padding: 8px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 20px; align-items: center; }
.stat { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }
.stat span { color: var(--text2); }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 20px; height: 100%; }
.empty svg { width: 48px; height: 48px; color: var(--text3); }
.empty-title { font-size: 15px; font-weight: 500; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); text-align: center; max-width: 280px; line-height: 1.6; }

.loading { display: flex; align-items: center; justify-content: center; height: 100%; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-name">MANYFOLD</div>
      <div class="brand-sub">STL Library</div>
    </div>

    <div class="config-section">
      <div class="config-label">
        Connection
        <span class="config-clear" onclick="clearCredentials()">Clear saved</span>
      </div>
      <input class="config-input" id="server-url" placeholder="LOCAL HOST IP">
      <input class="config-input" id="client-id" placeholder="Client ID">
      <input class="config-input" id="client-secret" placeholder="Client Secret" type="password">
      <button class="connect-btn" onclick="connect()">Connect</button>
      <div class="connect-status status-idle" id="connect-status">Not connected</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Browse</div>
      <div class="nav-item active" onclick="setView('models')" id="nav-models">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Models
        <span class="nav-count" id="count-models">—</span>
      </div>
      <div class="nav-item" onclick="setView('collections')" id="nav-collections">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Collections
        <span class="nav-count" id="count-collections">—</span>
      </div>
      <div class="nav-item" onclick="setView('creators')" id="nav-creators">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Creators
        <span class="nav-count" id="count-creators">—</span>
      </div>
    </div>

    <div class="tag-section">
      <div class="nav-label" style="padding:0 8px;margin-bottom:8px">Tags</div>
      <div class="tag-chips" id="tag-chips">
        <span style="font-size:11px;color:var(--text3);padding:4px 8px">Connect to load tags</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title" id="toolbar-title">All Models</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search models..." id="search-input" oninput="debounceSearch()">
      </div>
      <div class="sort-wrap">
        <select id="sort-select" onchange="fetchModels(1)">
          <option value="name">Sort: Name</option>
          <option value="recent">Sort: Recent</option>
          <option value="updated">Sort: Updated</option>
        </select>
      </div>
      <div class="view-btns">
        <button class="view-btn active" id="vbtn-grid" onclick="setDisplayMode('grid')" title="Grid view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="vbtn-list" onclick="setDisplayMode('list')" title="List view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <div class="empty-title">Connect to your library</div>
        <div class="empty-sub">Enter your Manyfold server URL and API credentials, then click Connect</div>
      </div>
    </div>

    <div class="statusbar">
      <div class="stat">Models: <span id="stat-total">—</span></div>
      <div class="stat">Page: <span id="stat-page">—</span></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'voxenworks_connection';
const cubeIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;

let accessToken = null;
let serverUrl = '';
let displayMode = 'grid';
let currentPage = 1;
let searchTimer = null;

function saveCredentials() {
  const data = {
    url: document.getElementById('server-url').value,
    clientId: document.getElementById('client-id').value,
    clientSecret: document.getElementById('client-secret').value
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadCredentials() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const data = JSON.parse(saved);
    if (data.url) document.getElementById('server-url').value = data.url;
    if (data.clientId) document.getElementById('client-id').value = data.clientId;
    if (data.clientSecret) document.getElementById('client-secret').value = data.clientSecret;
    return !!(data.url && data.clientId && data.clientSecret);
  } catch(e) { return false; }
}

function clearCredentials() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('server-url').value = '';
  document.getElementById('client-id').value = '';
  document.getElementById('client-secret').value = '';
  accessToken = null;
  setStatus('Credentials cleared', 'idle');
}

function setStatus(msg, type) {
  const el = document.getElementById('connect-status');
  el.textContent = msg;
  el.className = `connect-status status-${type}`;
}

async function connect() {
  const url = document.getElementById('server-url').value.replace(/\/$/, '');
  const clientId = document.getElementById('client-id').value.trim();
  const clientSecret = document.getElementById('client-secret').value.trim();

  if (!url || !clientId || !clientSecret) {
    setStatus('Fill in all fields', 'err');
    return;
  }

  serverUrl = url;
  setStatus('Connecting...', 'loading');

  try {
    const resp = await fetch(`${url}/oauth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'client_credentials',
        client_id: clientId,
        client_secret: clientSecret,
        scope: 'read public'
      })
    });

    if (!resp.ok) throw new Error(`Auth failed: ${resp.status}`);
    const data = await resp.json();
    accessToken = data.access_token;

    saveCredentials();
    setStatus('Connected', 'ok');
    fetchModels(1);
    fetchCollections();
    fetchCreators();
  } catch(e) {
    setStatus('Connection failed — check credentials', 'err');
    console.error(e);
  }
}

async function apiFetch(path) {
  const resp = await fetch(`${serverUrl}${path}`, {
    headers: {
      'Authorization': `Bearer ${accessToken}`,
      'Accept': 'application/vnd.manyfold.v0+json'
    }
  });
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  return resp.json();
}

async function fetchModels(page = 1) {
  if (!accessToken) return;
  currentPage = page;
  showLoading();

  const q = document.getElementById('search-input').value.trim();
  const order = document.getElementById('sort-select').value;
  let path = `/models?page=${page}&order=${order}`;
  if (q) path += `&search=${encodeURIComponent(q)}`;

  try {
    const data = await apiFetch(path);
    const total = data.totalItems || 0;
    document.getElementById('stat-total').textContent = total.toLocaleString();
    document.getElementById('count-models').textContent = total.toLocaleString();
    renderModels(data.member || []);
    renderPagination(data.view, page);
  } catch(e) {
    showError('Failed to load models — API may still be scanning');
    console.error(e);
  }
}

async function fetchCollections() {
  if (!accessToken) return;
  try {
    const data = await apiFetch('/collections');
    document.getElementById('count-collections').textContent = (data.totalItems || 0).toLocaleString();
  } catch(e) {}
}

async function fetchCreators() {
  if (!accessToken) return;
  try {
    const data = await apiFetch('/creators');
    document.getElementById('count-creators').textContent = (data.totalItems || 0).toLocaleString();
  } catch(e) {}
}

function modelId(m) {
  if (typeof m['@id'] === 'string') {
    const parts = m['@id'].split('/');
    return parts[parts.length - 1];
  }
  return m.id || '';
}

function renderModels(models) {
  const content = document.getElementById('content');
  if (models.length === 0) {
    content.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div class="empty-title">No models found</div>
      <div class="empty-sub">Try a different search term</div>
    </div>`;
    return;
  }

  if (displayMode === 'grid') {
    const cards = models.map(m => {
      const id = modelId(m);
      return `<div class="card" onclick="openModel('${id}')">
        <div class="card-thumb">
          <img src="${serverUrl}/models/${id}/card_image" 
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" 
               style="display:block">
          <div style="display:none;width:100%;height:100%;align-items:center;justify-content:center">${cubeIcon}</div>
          <span class="format-badge">3D</span>
        </div>
        <div class="card-body">
          <div class="card-name" title="${(m.name||'').replace(/"/g,'&quot;')}">${m.name||'Unnamed'}</div>
          <div class="card-sub">ID ${id}</div>
        </div>
      </div>`;
    }).join('');
    content.innerHTML = `<div class="grid">${cards}</div>`;
  } else {
    const items = models.map(m => {
      const id = modelId(m);
      return `<div class="list-item" onclick="openModel('${id}')">
        <div class="list-icon">
          <img src="${serverUrl}/models/${id}/card_image" 
               onerror="this.style.display='none';this.parentElement.innerHTML='${cubeIcon.replace(/'/g,"\\'").replace(/"/g,'&quot;')}'" 
               style="display:block">
        </div>
        <div class="list-info">
          <div class="list-name">${m.name||'Unnamed'}</div>
          <div class="list-meta">ID: ${id}</div>
        </div>
      </div>`;
    }).join('');
    content.innerHTML = `<div class="list">${items}</div>`;
  }
}

function renderPagination(view, page) {
  const existing = document.querySelector('.pagination');
  if (existing) existing.remove();
  if (!view) return;

  const lastUrl = view.last || '';
  const lastMatch = lastUrl.match(/page=(\d+)/);
  const totalPages = lastMatch ? parseInt(lastMatch[1]) : 1;
  document.getElementById('stat-page').textContent = `${page} / ${totalPages}`;

  const pag = document.createElement('div');
  pag.className = 'pagination';

  let html = `<button class="page-btn" onclick="fetchModels(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`;
  const start = Math.max(1, page - 2);
  const end = Math.min(totalPages, page + 2);
  if (start > 1) html += `<button class="page-btn" onclick="fetchModels(1)">1</button><span class="page-info">...</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn${i===page?' active':''}" onclick="fetchModels(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `<span class="page-info">...</span><button class="page-btn" onclick="fetchModels(${totalPages})">${totalPages}</button>`;
  html += `<button class="page-btn" onclick="fetchModels(${page+1})" ${page>=totalPages?'disabled':''}>Next →</button>`;

  pag.innerHTML = html;
  document.querySelector('.content').after(pag);
}

function openModel(id) {
  window.open(`${serverUrl}/models/${id}`, '_blank');
}

function setView(v) {
  ['models','collections','creators'].forEach(n => {
    document.getElementById(`nav-${n}`).classList.toggle('active', n===v);
  });
  document.getElementById('toolbar-title').textContent = 
    v === 'models' ? 'All Models' : v === 'collections' ? 'Collections' : 'Creators';
  if (v === 'models') fetchModels(1);
  else window.open(`${serverUrl}/${v}`, '_blank');
}

function setDisplayMode(m) {
  displayMode = m;
  document.getElementById('vbtn-grid').classList.toggle('active', m==='grid');
  document.getElementById('vbtn-list').classList.toggle('active', m==='list');
  if (accessToken) fetchModels(currentPage);
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => fetchModels(1), 400);
}

function showLoading() {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  const existing = document.querySelector('.pagination');
  if (existing) existing.remove();
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div class="empty-title">Could not load models</div>
    <div class="empty-sub">${msg}</div>
  </div>`;
}

// Load saved credentials on startup and auto-connect
window.addEventListener('load', () => {
  const hasCredentials = loadCredentials();
  if (hasCredentials) {
    setStatus('Saved credentials loaded', 'loading');
    connect();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.classList.contains('config-input')) {
    connect();
  }
});
</script>
</body>
</html>
